<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Demo</title>
</head>
<body>

    <h2>Login System</h2>

    <input type="text" id="username" placeholder="Username"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>

    <button id="loginBtn">Login</button>
    <button id="logoutBtn" style="display:none;">Logout</button>
    <button id="getBtn" style="display:none;">Get Secret</button>

    <script>
        const BASE_URL = "http://localhost:3000";

        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const getBtn = document.getElementById('getBtn');

        function checkStatus() {
            const xhr = new XMLHttpRequest();
            xhr.withCredentials = true;

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        loginBtn.style.display = 'none';
                        logoutBtn.style.display = 'inline';
                        getBtn.style.display = 'inline';
                    } else {
                        loginBtn.style.display = 'inline';
                        logoutBtn.style.display = 'none';
                        getBtn.style.display = 'none';
                    }
                }
            };

            xhr.open('GET', BASE_URL + '/httponly-cookie/check');
            xhr.send();
        }

        loginBtn.onclick = function () {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const xhr = new XMLHttpRequest();
            xhr.withCredentials = true;

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        alert("Login successful!");
                        checkStatus();
                    } else {
                        alert("Login failed!");
                    }
                }
            };

            xhr.open('POST', BASE_URL + '/httponly-cookie/login');
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify({ username, password }));
        };

        logoutBtn.onclick = function () {
            const xhr = new XMLHttpRequest();
            xhr.withCredentials = true;

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    alert("Logged out!");
                    checkStatus();
                }
            };

            xhr.open('POST', BASE_URL + '/httponly-cookie/logout');
            xhr.send();
        };

        getBtn.onclick = function () {
            const xhr = new XMLHttpRequest();
            xhr.withCredentials = true;

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        const res = JSON.parse(xhr.responseText);
                        alert(res.message);
                    } else {
                        alert("Not logged in!");
                        checkStatus();
                    }
                }
            };

            xhr.open('GET', BASE_URL + '/httponly-cookie/something');
            xhr.send();
        };

        checkStatus();
    </script>

</body>
</html>
